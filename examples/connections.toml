# Example connection map.
#
# Each table is a source JACK client. Each key is one of that client's output
# (or capture) ports; its value lists the destination input ports to connect to,
# given as full "client:port" names.
#
# The watcher only *adds* the connections it can resolve. Ports that do not
# currently exist are skipped, so a single map can describe more clients than
# happen to be running at any moment.

[synth]
# synth:out_left  -> mixer:in_1, and also -> recorder:in_1
out_left = ["mixer:in_1", "recorder:in_1"]
out_right = ["mixer:in_2", "recorder:in_2"]

[mixer]
# Quoted keys are fine for ports whose names contain spaces or slashes.
"master_out 1" = ["system:playback_1"]
"master_out 2" = ["system:playback_2"]

# Regex matching. A `regex:` marker on the key matches against this client's
# port names; on a value it matches against full destination port names. Useful
# when a device exposes a variable suffix (e.g. an index or revision).
[capture-device]
"regex:capture_.*" = ["regex:effects:input_.*"]

# A `disconnect:` prefix on the key removes the listed edges instead of adding
# them — handy for steering a signal away from a default route. It can be
# combined with `regex:`.
[player]
"disconnect:out_0" = ["system:playback_1"]
"disconnect:regex:out_.*" = ["regex:monitor:.*"]

# Split a large map across files. Paths are resolved relative to this file;
# same-key lists from multiple files are merged.
# include = ["midi.toml", "instruments.toml"]
